<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Site{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        nav {
            background: #3b82f6;
            padding: 1rem 2rem;
            display: flex;
            gap: 1rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .content {
            padding: 2rem;
        }
    </style>
</head>

<body>

    <nav>
        <a href="/">Home</a>
        <a href="/about/">About</a>
        
        {% if user.is_authenticated %}
        <a href="/post/create/" style="
                    background: white;
                    color: #3b82f6;
                    padding: 0.3rem 0.8rem;
                    border-radius: 6px;
                ">+ New Post</a>
        <span style="color: white; margin-left: auto;">
            👤 {{ user.username }}
        </span>
        <a href="/logout/" style="color: white;">Logout</a>
        {% else %}
        <a href="/login/" style="color: white; margin-left: auto;">Login</a>
        <a href="/register/" style="color: white;">Register</a>
        {% endif %}

        
    </nav>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
